<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>هدیه تو ❤️</title>

<link rel="stylesheet" href="style.css">

<style>

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.container{
text-align:center;
z-index:10;
}

h2{
color:white;
margin-bottom:30px;
}

.gift{
font-size:130px;
cursor:pointer;
transition:.5s;
animation:jump 2s infinite;
user-select:none;
}

@keyframes jump{

0%,100%{
transform:translateY(0);
}

50%{
transform:translateY(-18px);
}

}

#message{
margin-top:20px;
font-size:22px;
color:white;
min-height:35px;
}

#next{

display:none;

margin-top:35px;

padding:15px 35px;

font-size:18px;

border:none;

border-radius:40px;

cursor:pointer;

background:white;

color:#ff3b7f;

font-weight:bold;

}

.spark{

position:absolute;

width:10px;

height:10px;

border-radius:50%;

background:gold;

animation:spark 1.5s linear forwards;

}

@keyframes spark{

0%{
opacity:1;
transform:scale(0);
}

100%{
opacity:0;
transform:translate(var(--x),var(--y)) scale(2);
}

}

.heart{

position:absolute;

font-size:30px;

animation:fly 4s linear forwards;

}

@keyframes fly{

0%{
transform:translateY(0);
opacity:1;
}

100%{
transform:translateY(-900px);
opacity:0;
}

}

</style>

</head>

<body>

<div class="container">

<h2>🎁   قبلش حرفی داری بگو خانومی...</h2>

<div class="gift" id="gift">
🎁
</div>

<div id="message">
روی هدیه کلیک کن ❤️
</div>

<button id="next">
میو نامه 💌
</button>

</div>

<script>

const gift=document.getElementById("gift");
const message=document.getElementById("message");
const next=document.getElementById("next");

gift.onclick=function(){

gift.innerHTML="📦";
gift.style.transform="scale(1.3) rotate(12deg)";

message.innerHTML="  تادااااا... 💖";

for(let i=0;i<120;i++){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML=Math.random()>0.5?"❤️":"💖";

heart.style.left=Math.random()*100+"vw";

heart.style.bottom="-30px";

heart.style.fontSize=(20+Math.random()*30)+"px";

heart.style.animationDelay=Math.random()+"s";

document.body.appendChild(heart);

}

for(let i=0;i<80;i++){

let s=document.createElement("div");

s.className="spark";

s.style.left="50%";
s.style.top="50%";

s.style.setProperty("--x",(Math.random()*900-450)+"px");
s.style.setProperty("--y",(Math.random()*900-450)+"px");

document.body.appendChild(s);

}

gift.style.pointerEvents="none";

setTimeout(()=>{

next.style.display="inline-block";

},2000);

}

next.onclick=function(){

window.location.href="letter.html";

}

</script>

</body>
</html>
