<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>یه سوال ازت دخترم❤️</title>

<link rel="stylesheet" href="style.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Vazirmatn',sans-serif;
}

body{
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
background:linear-gradient(135deg,#ff4e8b,#ff758c,#ff9eb5);
overflow:hidden;
}

.card{

width:90%;
max-width:500px;

background:rgba(255,255,255,.18);

backdrop-filter:blur(20px);

padding:35px;

border-radius:30px;

text-align:center;

color:darkblue;

box-shadow:0 15px 35px rgba(0,0,0,.25);

}

h1{

font-size:32px;

margin-bottom:20px;

}

p{

font-size:20px;

line-height:2;

margin-bottom:35px;

}

button{

width:100%;

padding:16px;

margin-top:15px;

border:none;

border-radius:50px;

font-size:18px;

font-weight:bold;

cursor:pointer;

transition:.3s;

background:darkblue;

color:#ff3f7d;

}

button:hover{

transform:scale(1.05);

}

</style>

</head>

<body>

<div class="card">

<h1>❤️ یه سوال...</h1>

<p>

اگر دوباره به گذشته برگردی...

<br><br>

باز هم منو انتخاب می‌کنی؟

</p>

<button onclick="nextPage()">
💖 آره، هزار بار
</button>

<button onclick="nextPage()">
🥹 معلومه که آره
</button>

</div>

<script>

function nextPage(){

window.location.href="final.html";

}

</script>

</body>

</html>
